name: Calibrate Health Weights (Quarterly Proposal)

# v19.97 紅綠燈權重校準 Phase 3 一鍵化(方法論見 MACRO_HEALTH_REWEIGHT_PROPOSAL.md):
# 前置:先跑過「Update Macro History (Daily)」bootstrap,repo 內須有
#   data_cache/{twii_ohlcv,finmind_inst,finmind_m1m2}.parquet(v19.97 起 cron 會真的 commit)。
# 本 workflow:跑 scripts/calibrate_health_weights.py(讀真實 parquet → walk-forward
# 擬 3 權重)→ 把 MACRO_HEALTH_WEIGHT_PROPOSAL.md commit 回 repo 供人審。
# 缺 parquet 時 script 會 SystemExit 並明講缺什麼(§1 fail loud,不用合成資料)。
# ⚠️ 不改任何 SSOT 常數 — 本 workflow 產物只是「提案報告」;要改權重永遠須走
# 人審 PR(如 #517)。故排程自動化零位移風險(user 2026-07-12 要求免記日程)。

on:
  workflow_dispatch:
  # v19.104:每季首日 UTC 10:00(TW 18:00)自動產提案 — 排在同日 09:00 UTC 的
  # Update Macro History 之後,吃到當季最新 parquet;與 recalibrate_macro
  # (門檻,UTC 00:00)同日錯時,兩份季檢互不干擾。
  schedule:
    - cron: '0 10 1 1,4,7,10 *'

permissions:
  contents: write

jobs:
  calibrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        # v19.99 修:改裝整份 requirements(依賴 SSOT)。手挑清單漏 bs4 —
        # import src.compute.macro 觸發 sibling eager import 連到 L1
        # leading_indicators(BeautifulSoup)。對齊 update_health_history.yml
        # 既有註解「完整 requirements…裝齊避免 ModuleNotFoundError」慣例。
        run: pip install -r requirements.txt

      - name: Run calibration
        run: python scripts/calibrate_health_weights.py

      - name: Commit proposal
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add MACRO_HEALTH_WEIGHT_PROPOSAL.md
          if git diff --staged --quiet; then
            echo "→ 提案無變化，跳過 commit"
          else
            DATE=$(date +%Y-%m-%d)
            git commit -m "🤖 紅綠燈權重校準提案：$DATE（待人審,未改 SSOT）"
            git push
          fi
