name: Update Fundamentals Snapshot (Quarterly)

# 全台股基本面季快照:每季財報公布後,抓 MOPS 全市場損益+資產負債彙總 → parquet,
# commit 進 repo 供選股網讀取(不再即時打 API)。手動可觸發(含回補指定季)。

on:
  workflow_dispatch:
    inputs:
      roc_year:
        description: '民國年（留空=自動抓最新已公布季）'
        required: false
        default: ''
      season:
        description: '季別 1-4；可逗號分隔多季回補如 2,3,4（留空=自動）'
        required: false
        default: ''
  schedule:
    # 第一趟:截止日 + 約 1 週（求新鮮，多數公司已到齊）；UTC 06:00 = TW 14:00
    - cron: '0 6 7 4 *'    # 4/7  → 抓去年年報 Q4（公布截止 3/31 + 1 週）
    - cron: '0 6 22 5 *'   # 5/22 → 抓今年 Q1（公布截止 5/15 + 1 週）
    - cron: '0 6 21 8 *'   # 8/21 → 抓今年 Q2（公布截止 8/14 + 1 週）
    - cron: '0 6 21 11 *'  # 11/21 → 抓今年 Q3（公布截止 11/14 + 1 週）
    # 第二趟:截止日 + 約 5 週（掃「慢公布 / 展延申報」的公司）。auto 模式判成同一季 →
    # 重抓覆蓋同檔 parquet（腳本 §5 冪等）；MOPS 彙總累加,晚交者這趟即補進。
    - cron: '0 6 5 5 *'    # 5/5  → 回頭補抓去年年報 Q4（3/31 + 約 5 週）
    - cron: '0 6 19 6 *'   # 6/19 → 回頭補抓今年 Q1（5/15 + 約 5 週）
    - cron: '0 6 18 9 *'   # 9/18 → 回頭補抓今年 Q2（8/14 + 約 5 週）
    - cron: '0 6 19 12 *'  # 12/19 → 回頭補抓今年 Q3（11/14 + 約 5 週）

permissions:
  contents: write

jobs:
  update-fundamentals:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        # 用完整 requirements:import mops_bulk_fetcher 會觸發 src/data/stock/__init__ 的
        # sibling eager import(tw_stock_data_fetcher 需 bs4 等),裝齊避免 ModuleNotFoundError。
        run: pip install -r requirements.txt

      - name: Fetch fundamentals snapshot
        run: |
          if [ -n "${{ github.event.inputs.roc_year }}" ] && [ -n "${{ github.event.inputs.season }}" ]; then
            python scripts/update_fundamentals_snapshot.py --roc-year ${{ github.event.inputs.roc_year }} --season ${{ github.event.inputs.season }}
          else
            python scripts/update_fundamentals_snapshot.py
          fi

      - name: Commit and Push Changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add data_cache/fundamentals/
          if git diff --staged --quiet; then
            echo "→ data_cache/fundamentals/ 無變更，跳過 commit"
          else
            git commit -m "🤖 基本面季快照更新：$(date +%Y-%m-%d)"
            git push
          fi
