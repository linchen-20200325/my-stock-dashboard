name: Update Macro History (Daily)

on:
  workflow_dispatch:
    inputs:
      bootstrap:
        description: '砍掉重抓全部 20 年歷史（初次部署用）'
        required: false
        default: 'false'
      years:
        description: 'bootstrap 歷史長度（年）'
        required: false
        default: '20'
  schedule:
    # 每日 UTC 09:00（TW 17:00 收盤後，FinMind T+1 通常此時資料已備齊）
    - cron: '0 9 * * *'

permissions:
  contents: write

jobs:
  update-history:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-macro-history-${{ hashFiles('requirements.txt') }}

      - name: Install minimal deps
        # 只裝 scripts/update_macro_history.py 需要的：pandas / pyarrow / requests + proxy_helper deps
        run: pip install pandas pyarrow requests urllib3

      - name: Fetch historical data
        env:
          PROXY_URL: ${{ secrets.PROXY_URL }}
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          NAS_BASE_URL: ${{ secrets.NAS_BASE_URL }}
          NAS_API_KEY: ${{ secrets.NAS_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.bootstrap }}" = "true" ]; then
            python scripts/update_macro_history.py --bootstrap --years ${{ github.event.inputs.years || '20' }}
          else
            python scripts/update_macro_history.py
          fi

      - name: Commit and Push Changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add data_cache/
          if git diff --staged --quiet; then
            echo "→ data_cache/ 無增量，跳過 commit"
          else
            DATE=$(date +%Y-%m-%d)
            git commit -m "🤖 每日總經歷史增量：$DATE"
            git push
          fi
