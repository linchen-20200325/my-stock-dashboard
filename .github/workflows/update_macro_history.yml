name: Update Macro History (Daily)

on:
  workflow_dispatch:
    inputs:
      bootstrap:
        description: '砍掉重抓全部 20 年歷史（初次部署用）'
        required: false
        default: 'false'
      years:
        description: 'bootstrap 歷史長度（年）'
        required: false
        default: '20'
  schedule:
    # 每日 UTC 09:00（TW 17:00 收盤後，FinMind T+1 通常此時資料已備齊）
    - cron: '0 9 * * *'

permissions:
  contents: write

jobs:
  update-history:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-macro-history-${{ hashFiles('requirements.txt') }}

      - name: Install deps
        # v19.100 修:極簡清單害 finmind_m1m2 每次靜默跳過 —
        # 「[finmind_m1m2] 缺 proxy_helper / tw_macro」實為 import tw_macro 觸發
        # src.data.macro sibling eager import 連到 leading_indicators(bs4),極簡清單
        # 沒裝 bs4 → ImportError → CBC 段整段 skip(2026-07-11 run 實錘)。
        # 改裝整份 requirements(依賴 SSOT;同 calibrate v19.99 / health_history 慣例)。
        run: pip install -r requirements.txt

      - name: Fetch historical data
        env:
          PROXY_URL: ${{ secrets.PROXY_URL }}
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          NAS_BASE_URL: ${{ secrets.NAS_BASE_URL }}
          NAS_API_KEY: ${{ secrets.NAS_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.bootstrap }}" = "true" ]; then
            python scripts/update_macro_history.py --bootstrap --years ${{ github.event.inputs.years || '20' }}
          else
            python scripts/update_macro_history.py
          fi

      - name: Commit and Push Changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          # v19.97 bug fix:.gitignore(v18.461) 蓋掉 data_cache/*.parquet,原 `git add data_cache/`
          # 每日 no-op → cron 抓的歷史從未 commit(main 上 0 筆 🤖 每日總經歷史增量)。
          # 加 -f 強制納管 parquet+metadata(CLAUDE.md §5:歷史運算用凍結快照 data_cache/ parquet)。
          git add -f data_cache/
          if git diff --staged --quiet; then
            echo "→ data_cache/ 無增量，跳過 commit"
          else
            DATE=$(date +%Y-%m-%d)
            git commit -m "🤖 每日總經歷史增量：$DATE"
            git push
          fi
