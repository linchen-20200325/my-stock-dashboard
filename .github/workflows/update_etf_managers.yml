name: Update ETF Managers

on:
  # 手動觸發（先用這個驗證 PROXY_URL 與抓取是否正常）
  workflow_dispatch:
  # 每週一 UTC 20:00（台灣 二 04:00）抓一次；經理人異動頻率低，週更足夠
  schedule:
    - cron: '0 20 * * 1'

permissions:
  contents: write

jobs:
  update-managers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests urllib3

      - name: Fetch ETF managers
        env:
          # 透過家用 NAS 代理抓 MoneyDJ；在 repo Secrets 設定 PROXY_URL 才會啟用
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: python scripts/update_etf_managers.py

      - name: Commit and Push Changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/etf/etf_managers.json
          if git diff --staged --quiet; then
            echo "No manager changes to commit."
          else
            git commit -m "🤖 自動更新：ETF 經理人 + 換手偵測"
            git push
          fi
