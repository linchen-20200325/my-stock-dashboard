[theme]
base = "dark"
primaryColor = "#1f6feb"
backgroundColor = "#0e1117"
secondaryBackgroundColor = "#161b22"
textColor = "#e6edf3"
font = "sans serif"

[server]
headless = true
runOnSave = false
enableCORS = false
enableMarkdownUnsafeHTML = true

[browser]
gatherUsageStats = false

[logger]
level = "error"
